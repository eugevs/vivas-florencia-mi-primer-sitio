<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>
  <link rel="stylesheet" href="style-form.css">
</head>
<body>

  <header>
    <h1>Florencia Vivas</h1>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="contact.html">Contacto</a></li>
      </ul>
    </nav>
  </header><h1>Contacto</h1>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li> <li><a href="contact.html">Contacto</a></li>
        </ul>
    </nav>
</header>

  <main>
    <section>
      <h2>Formulario de contacto</h2>

      <form action="#" method="post">

        <div class="campo">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre"
            placeholder="Tu nombre" required minlength="3">
        </div>

        <div class="campo">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email"
            placeholder="tu@email.com" required>
        </div>

        <div class="campo">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono"
            placeholder="+54 381 000-0000"
            pattern="[\+]?[0-9\s\-]{7,15}">
        </div>

        <div class="campo">
          <label for="asunto">Asunto</label>
          <select id="asunto" name="asunto" required>
            <option value="">-- Seleccioná una opción --</option>
            <option value="consulta">Consulta general</option>
            <option value="presupuesto">Solicitar presupuesto</option>
            <option value="soporte">Soporte técnico</option>
          </select>
        </div>

        <div class="campo">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje"
            placeholder="Escribí tu mensaje aquí..."
            required minlength="10" rows="5"></textarea>
        </div>

        <div class="campo campo-checkbox">
          <input type="checkbox" id="terminos" name="terminos" required>
          <label for="terminos">Acepto los términos y condiciones</label>
        </div>

        <button type="submit">Enviar mensaje</button>

      </form>
    </section>
  </main>

  <footer>
    <p>Desarrollado por [Florencia Vivas] — 2026</p>
  </footer>

</body>
</html>
